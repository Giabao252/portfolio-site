<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" rx="16" fill="#233024"/>
  <rect x="24" y="24" width="352" height="212" rx="10" fill="#182219"/>

  <!-- phone -->
  <rect x="150" y="45" width="100" height="170" rx="14" fill="#0f1710" stroke="#3d5c40" stroke-width="3"/>
  <rect x="160" y="60" width="80" height="130" rx="4" fill="#233024"/>
  <circle cx="200" cy="203" r="5" fill="#3d5c40"/>

  <!-- hand making a sign inside phone screen -->
  <g transform="translate(200,120)" fill="#4fd18a">
    <rect x="-8" y="-10" width="16" height="45" rx="8"/>
    <rect x="-26" y="-30" width="14" height="40" rx="7" transform="rotate(-12)"/>
    <rect x="-8" y="-38" width="14" height="45" rx="7"/>
    <rect x="10" y="-34" width="14" height="42" rx="7" transform="rotate(8)"/>
    <rect x="26" y="-22" width="13" height="35" rx="6.5" transform="rotate(18)"/>
    <path d="M -18 8 Q 0 26 18 8 L 18 20 Q 0 34 -18 20 Z"/>
  </g>

  <!-- letter badges floating around -->
  <g font-family="Arial, sans-serif" font-weight="bold" fill="#e8615c">
    <circle cx="80" cy="70" r="18" fill="#2f4030"/>
    <text x="80" y="76" font-size="18" text-anchor="middle" fill="#f5f3ff">A</text>
    <circle cx="320" cy="90" r="18" fill="#2f4030"/>
    <text x="320" y="96" font-size="18" text-anchor="middle" fill="#f5f3ff">S</text>
    <circle cx="90" cy="180" r="18" fill="#2f4030"/>
    <text x="90" y="186" font-size="18" text-anchor="middle" fill="#f5f3ff">L</text>
  </g>

  <text x="24" y="252" font-family="Arial, sans-serif" font-size="14" fill="#7fa084">ASL Learning App</text>
</svg>
